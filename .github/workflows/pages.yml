name: Deploy client sites to GitHub Pages

# Publishes only the sites/ folder (the client websites) to GitHub Pages.
# prospects/ and emails/ are intentionally NOT published.

on:
  push:
    branches: ["claude/website-sales-prospects-unbpno", "main"]
    paths: ["sites/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload sites/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./sites
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
